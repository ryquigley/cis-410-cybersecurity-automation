name: "Deploy — Dev"

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: "Build and Deploy to Dev VM"
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy app files to Dev VM
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no -r \
            app Dockerfile .dockerignore docker-compose.yml \
            "${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}:/opt/app"

      - name: Deploy Flask container
        run: |
          echo "${{ secrets.DEV_SSH_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no "${{ secrets.DEV_USER }}@${{ secrets.DEV_HOST }}" <<EOFSSH
          set -e
          cd /opt/app
          echo "=== Deploying on Dev VM ==="
          sudo docker-compose down
          sudo docker-compose up -d --build
          echo "=== Deploy complete ==="
          sudo docker-compose ps
          EOFSSH
          rm /tmp/deploy_key

      - name: Smoke test
        run: |
          sleep 5
          curl -f "http://${{ secrets.DEV_HOST }}:5000/health"
